x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  platform: linux/arm64
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: 'YlCImzjge_TeZc7jPJ7Jz3OJe7IAHe6MH4VlCImzABC='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    _PIP_ADDITIONAL_REQUIREMENTS: 'feedparser requests beautifulsoup4 lxml minio kafka-python langdetect python-dateutil schedule psycopg2-binary scikit-learn nltk'
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin123
    MINIO_BUCKET_BRONZE: bronze
    MINIO_BUCKET_SILVER: silver
    MINIO_BUCKET_GOLD: gold
    DWH_HOST: postgres-dwh
    DWH_PORT: 5432
    DWH_DB: news_dwh
    DWH_USER: news_user
    DWH_PASSWORD: news_pass
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  volumes:
    - ./dags:/opt/airflow/dags
    - ./etl:/opt/airflow/etl
    - ./scrapers:/opt/airflow/scrapers
    - ./quality:/opt/airflow/quality
    - ./warehouse:/opt/airflow/warehouse
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - news-net

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    platform: linux/arm64
    container_name: zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - news-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    platform: linux/arm64
    container_name: kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - news-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    platform: linux/arm64
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: news-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - news-net

  minio:
    image: minio/minio:latest
    platform: linux/arm64
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - news-net

  minio-init:
    image: minio/mc:latest
    platform: linux/arm64
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/bronze;
      mc mb --ignore-existing local/silver;
      mc mb --ignore-existing local/gold;
      mc mb --ignore-existing local/quality-reports;
      echo 'Buckets créés : bronze, silver, gold, quality-reports';
      "
    networks:
      - news-net

  postgres-airflow:
    image: postgres:15-alpine
    platform: linux/arm64
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - news-net

  postgres-dwh:
    image: postgres:15-alpine
    platform: linux/arm64
    container_name: postgres-dwh
    hostname: postgres-dwh
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: news_pass
      POSTGRES_DB: news_dwh
    volumes:
      - postgres-dwh-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "news_user", "-d", "news_dwh"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - news-net

  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - news-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@news-platform.local \
          --password admin
        echo "Airflow initialisé ✓"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  scraper:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: scraper
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_RAW: news-raw
      SCRAPING_INTERVAL_MINUTES: 60
    depends_on:
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./scrapers:/app
    networks:
      - news-net
    restart: unless-stopped

  etl-worker:
    build:
      context: ./etl
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: etl-worker
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      DWH_HOST: postgres-dwh
      DWH_PORT: 5432
      DWH_DB: news_dwh
      DWH_USER: news_user
      DWH_PASSWORD: news_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ETL_INTERVAL_MINUTES: 30
    depends_on:
      minio:
        condition: service_healthy
      postgres-dwh:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./etl:/app
      - ./quality:/app/quality
    networks:
      - news-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    platform: linux/arm64
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      postgres-dwh:
        condition: service_healthy
    networks:
      - news-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: news-api
    ports:
      - "8000:8000"
    environment:
      DWH_HOST: postgres-dwh
      DWH_PORT: 5432
      DWH_DB: news_dwh
      DWH_USER: news_user
      DWH_PASSWORD: news_pass
    depends_on:
      postgres-dwh:
        condition: service_healthy
    networks:
      - news-net
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: news-dashboard
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - news-net
    restart: unless-stopped

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  minio-data:
  postgres-airflow-data:
  postgres-dwh-data:
  redis-data:
  airflow-logs:
  airflow-plugins:
  grafana-data:

networks:
  news-net:
    driver: bridge
    name: news-platform-network
